<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link href="https://fonts.googleapis.com/css2?family=Darumadrop+One&display=swap" rel="stylesheet">
    <title>Characters - AmaiSharkyuu</title>
    <style>
        /* --- Style général avec dégradé personnalisé --- */
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            width: 100vw;
            font-family: 'Darumadrop One', cursive, sans-serif;
            background: linear-gradient(135deg, #a1c0d4 0%, #fae8ff 100%);
            display: flex;
            justify-content: center;
            align-items: flex-start; /* Aligne en haut pour permettre le scroll naturel */
            padding: 40px 0;
            box-sizing: border-box;
        }

        /* Conteneur principal calqué sur le profil */
        .characters-container {
            width: 100%;
            max-width: 360px;
            background: linear-gradient(135deg, #d4a1d4 0%, #fae8ff 100%);
            border: 2px solid #e2e8f0;
            border-top: 4px solid #f472b6;
            padding: 25px;
            box-sizing: border-box;
            box-shadow: 0 8px 20px rgba(15, 23, 42, 0.08);
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        /* En-tête */
        .char-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid #e2e8f0;
            padding-bottom: 12px;
        }

        .char-title {
            font-size: 1.5rem;
            color: #0f172a;
            margin: 0;
        }

        /* Bouton Retour Gris */
        .back-btn {
            background: linear-gradient(to bottom, #cbd5e1 0%, #64748b 100%);
            color: #ffffff;
            text-decoration: none;
            font-size: 0.85rem;
            padding: 6px 12px;
            border: 1px solid #475569;
            border-top: 2px solid #f1f5f9;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.3);
            box-shadow: 0 4px 10px rgba(100, 116, 139, 0.2);
        }
        .back-btn:hover {
            background: linear-gradient(to bottom, #f1f5f9 0%, #475569 100%);
        }

        /* Grille des personnages à 3 colonnes */
        .characters-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 12px;
        }

        /* Bloc comprenant le carré ET son texte en dessous */
        .char-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
        }

        /* Les petits carrés d'images */
        .char-square {
            width: 100%;
            aspect-ratio: 1 / 1;
            background: #ffffff;
            padding: 4px;
            border: 1px solid rgba(0, 0, 0, 0.15);
            box-shadow: 0 2px 5px rgba(0, 0, 0, 0.1);
            overflow: hidden;
            box-sizing: border-box;
            transition: transform 0.1s ease;
        }

        .char-square:hover {
            transform: scale(1.05);
        }

        .char-square img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            /* Empêche la sélection bleue de l'image */
            -webkit-user-select: none;
            -moz-user-select: none;
            -ms-user-select: none;
            user-select: none;
            /* Empêche le menu contextuel fantôme lors du drag sur certains navigateurs */
            -webkit-user-drag: none;
        }

        /* Nom du personnage juste en dessous */
        .char-name {
            font-size: 0.75rem;
            color: #334155;
            text-align: center;
            word-break: break-word; /* Évite que les noms longs cassent la grille */
            margin: 0;
        }
    </style>
</head>
<body>

    <div class="characters-container">
        <header class="char-header">
            <h1 class="char-title">⭐ Characters</h1>
            <a href="../" class="back-btn">⬅️ Back</a>
        </header>

        <div class="characters-grid">
            
            <div class="char-item">
                <div class="char-square">
                    <img src="Images/Jax TADC icon.jpg" alt="Jax" draggable="false">
                </div>
                <p class="char-name">Jax (TADC)</p>
            </div>

            <div class="char-item">
                <div class="char-square">
                    <img src="Images/🧼🫧.jpg" alt="Bubble" draggable="false">
                </div>
                <p class="char-name">Bubble (TADC)</p>
            </div>

            <div class="char-item">
                <div class="char-square">
                    <img src="Images/Kinger.jpg" alt="Kinger" draggable="false">
                </div>
                <p class="char-name">Kinger (TADC)</p>
            </div>

            <div class="char-item">
                <div class="char-square">
                    <img src="Images/Jodio.jpg" alt="Jodio" draggable="false">
                </div>
                <p class="char-name">Jodio (JoJoLands)</p>
            </div>

            <div class="char-item">
                <div class="char-square">
                    <img src="Images/★Dragona Joestar★.jpg" alt="Dragona Joestar" draggable="false">
                </div>
                <p class="char-name">Dragona Joestar (JoJoLands)</p>
            </div>


            <div class="char-item">
                <div class="char-square">
                    <img src="Images/Verity.webp" alt="Verity" draggable="false">
                </div>
                <p class="char-name">Verity (ThatMob)</p>
            </div>

        </div>
    </div>

</body>
</html>
